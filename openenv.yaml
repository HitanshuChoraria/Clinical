name: clinical-trial-env
version: "1.0.0"
description: >
  An OpenEnv environment where AI agents act as medical monitors reviewing
  clinical trial data — screening patients for eligibility violations,
  classifying adverse event severity, and reviewing protocol amendments for
  safety and regulatory compliance concerns.

tags:
  - openenv
  - healthcare
  - clinical-trials
  - medical-monitoring
  - regulatory
  - safety

tasks:
  - name: eligibility_screening
    difficulty: easy
    description: >
      Review 5 patient records for ONCO-2024-301 (Phase II oncology trial) and
      identify all eligibility violations against inclusion/exclusion criteria.
      4 of 5 patients have violations; 1 is correctly enrolled. Partial credit
      for finding violations, penalty for false positives.
    grader: server.graders:eligibility_grader
    max_steps: 3
    score_range: [0.01, 0.99]
    expected_baseline_score: 0.35

  - name: ae_classification
    difficulty: medium
    description: >
      Review 7 adverse event reports in CARD-2024-112 (Phase III cardiology trial)
      and identify all misclassifications by severity grade. 4 of 7 AEs are
      misclassified; agents must identify wrong grades, suggest corrections,
      and flag missing SAE reports. Penalized for false positives.
    grader: server.graders:ae_grader
    max_steps: 4
    score_range: [0.01, 0.99]
    expected_baseline_score: 0.22

  - name: protocol_amendment_review
    difficulty: hard
    description: >
      Comprehensively review 6 proposed protocol amendments for NEURO-2024-450
      (Phase II psychiatric trial for treatment-resistant depression). Identify
      critical safety issues, GCP compliance failures, and statistical gaps.
      8 ground-truth issues with weighted scoring. Requires deep domain knowledge
      of ICH guidelines, FDA/EMA requirements, and psychiatric trial design.
    grader: server.graders:protocol_grader
    max_steps: 5
    score_range: [0.01, 0.99]
    expected_baseline_score: 0.15

  - name: medication_reconciliation
    difficulty: medium
    description: >
      Identify prohibited concomitant medications (VKAs and CYP3A4 inhibitors)
      in Atrial Fibrillation trial CARD-2024-550 across subject records.
    grader: server.graders:medication_grader
    max_steps: 3
    score_range: [0.01, 0.99]
    expected_baseline_score: 0.50

action_space:
  type: structured_json
  fields:
    findings:
      type: array
      items:
        finding_type:
          type: string
          enum: [protocol_deviation, adverse_event, eligibility_violation, safety_concern, amendment_recommendation]
        severity:
          type: string
          enum: [critical, major, minor, informational]
        subject_id:
          type: string
          nullable: true
        description:
          type: string
        recommendation:
          type: string
    rationale:
      type: string

observation_space:
  type: structured_json
  fields:
    task_name: string
    protocol_summary: string
    patient_records: array
    adverse_events: array
    protocol_text: string
    step: integer
    feedback: string
    partial_score: float

reward:
  type: continuous
  range: [0.01, 0.99]
  description: >
    Incremental reward per step = improvement in grader score since last step.
    Final reward is strictly within (0, 1) — never 0 or 1.
    Empty/trivial actions receive a floor reward of 0.01 (never 0).

endpoints:
  health: /health
  metadata: /metadata
  tasks: /tasks
  reset: /reset
  step: /step
  state: /state
  mcp: /mcp

docker:
  port: 7860
  build_context: "."
  dockerfile: Dockerfile