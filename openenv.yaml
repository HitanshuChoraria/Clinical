name: clinical-trial-env
version: "1.0.0"
description: >
  An OpenEnv environment where AI agents act as medical monitors reviewing
  clinical trial data — screening patients for eligibility violations,
  classifying adverse event severity, and reviewing protocol amendments for
  safety and regulatory compliance concerns.

tags:
  - openenv
  - healthcare
  - clinical-trials
  - medical-monitoring
  - regulatory
  - safety

tasks:
  - id: eligibility_screening        # ← ADD
    name: eligibility_screening
    difficulty: easy
    has_grader: true                 # ← ADD
    grader: server.graders.eligibility_grader
    max_steps: 3
    score_range: [0.0, 1.0]
    expected_baseline_score: 0.35

  - id: ae_classification            # ← ADD
    name: ae_classification
    difficulty: medium
    has_grader: true                 # ← ADD
    grader: server.graders.ae_grader
    max_steps: 4
    score_range: [0.0, 1.0]
    expected_baseline_score: 0.22

  - id: protocol_amendment_review    # ← ADD
    name: protocol_amendment_review
    difficulty: hard
    has_grader: true                 # ← ADD
    grader: server.graders.protocol_grader
    max_steps: 5
    score_range: [0.0, 1.0]
    expected_baseline_score: 0.15

  - id: medication_reconciliation    # ← ADD
    name: medication_reconciliation
    difficulty: medium
    has_grader: true                 # ← ADD
    grader: server.graders.medication_grader
    max_steps: 3
    score_range: [0.0, 1.0]
    expected_baseline_score: 0.50

action_space:
  type: structured_json
  fields:
    findings:
      type: array
      items:
        finding_type:
          type: string
          enum: [protocol_deviation, adverse_event, eligibility_violation, safety_concern, amendment_recommendation]
        severity:
          type: string
          enum: [critical, major, minor, informational]
        subject_id:
          type: string
          nullable: true
        description:
          type: string
        recommendation:
          type: string
    rationale:
      type: string

observation_space:
  type: structured_json
  fields:
    task_name: string
    protocol_summary: string
    patient_records: array
    adverse_events: array
    protocol_text: string
    step: integer
    feedback: string
    partial_score: float

reward:
  type: continuous
  range: [0.0, 1.0]
  description: >
    Current absolute score from the task grader.
    Scores are strictly within (0.01, 0.99) — never 0 or 1.
    Empty/trivial actions receive a floor score of 0.01.

endpoints:
  health: /health
  metadata: /metadata
  tasks: /tasks
  reset: /reset
  step: /step
  state: /state
  mcp: /mcp

docker:
  port: 7860
  build_context: "."
  dockerfile: Dockerfile